<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftSolve - Fast Math Challenge</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 40px 0 0 0; text-align: center; 
            background-image: url('web_background.png'); 
            background-size: cover; background-position: center; 
            background-attachment: fixed; background-repeat: no-repeat; color: #000;
        }
        .logo { 
            width: 120px; border-radius: 22%; margin-bottom: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); transition: transform 0.3s ease;
        }
        .logo:hover { transform: scale(1.1); }
        h1 { font-size: 3em; margin: 0 0 10px 0; text-shadow: 0 2px 4px rgba(255,255,255,0.5); }
        .description { 
            font-size: 1.3em; color: #222; margin-bottom: 25px; 
            font-weight: 600; max-width: 650px; margin-left: auto; margin-right: auto; padding: 0 20px; 
        }
        .lang-icons { margin-bottom: 30px; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; padding: 0 20px; }
        .lang-icons img { width: 32px; height: 32px; transition: transform 0.3s ease; cursor: default; }
        .lang-icons img:hover { transform: scale(1.25); }
        
        .store-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; flex-wrap: wrap; }
        .store-btn { transition: transform 0.3s ease; }
        .store-btn:hover { transform: scale(1.08); }
        .store-btn img { width: 180px; height: auto; display: block; border-radius: 10px; }
        
        .gallery-wrapper { width: 100%; display: flex; justify-content: center; margin-bottom: 40px; }
        .screenshot-gallery { 
            display: flex; overflow-x: auto; gap: 20px; padding: 40px; 
            max-width: 100%; scrollbar-width: none; -webkit-overflow-scrolling: touch; 
        }
        .screenshot-gallery::-webkit-scrollbar { display: none; }
        .screenshot-gallery img { 
            flex: 0 0 auto; width: 220px; border-radius: 18px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); transition: transform 0.3s ease;
        }
        .screenshot-gallery img:hover { transform: translateY(-10px); }

        .footer { 
            margin-top: 40px; padding: 40px 20px; display: flex; 
            justify-content: space-between; align-items: center; max-width: 1000px; 
            margin-left: auto; margin-right: auto; font-size: 0.9em; border-top: 1px solid rgba(0,0,0,0.1);
        }
        .footer-right { display: flex; gap: 20px; }
        .footer-right a { color: #000; text-decoration: none; font-weight: 700; }
        
        @media (max-width: 768px) { 
            .footer { flex-direction: column; gap: 20px; text-align: center; } 
            .screenshot-gallery img { width: 180px; } 
            h1 { font-size: 2.2em; }
        }
    </style>
</head>
<body>
    <img src="swiftsolve_logo.png" alt="SwiftSolve Logo" class="logo">
    <h1>SwiftSolve</h1>
    <p class="description">Master mental math! Solve fast, compete with friends, and climb the global leaderboard.</p>
    
    <div class="lang-icons">
        <img src="eng.png" title="English" alt="English">
        <img src="tur.png" title="Turkish" alt="Turkish">
        <img src="ger.png" title="German" alt="German">
        <img src="fra.png" title="French" alt="French">
        <img src="esp.png" title="Spanish" alt="Spanish">
        <img src="ita.png" title="Italian" alt="Italian">
        <img src="por.png" title="Portuguese" alt="Portuguese">
        <img src="jap.png" title="Japanese" alt="Japanese">
        <img src="kor.png" title="Korean" alt="Korean">
        <img src="chi.png" title="Chinese" alt="Chinese">
    </div>
    
    <div class="store-container">
        <a
            href="https://apps.apple.com/us/app/swift-solve-game/id6761437338"
            class="store-btn"
            target="_blank"
            rel="noopener noreferrer"
        >
            <img src="applestore.png" alt="App Store">
        </a>
        <a href="#" class="store-btn">
            <img src="playstore.png" alt="Play Store">
        </a>
    </div>

    <div class="gallery-wrapper">
        <div class="screenshot-gallery">
            <img src="1.png" alt="Screenshot 1">
            <img src="2.png" alt="Screenshot 2">
            <img src="3.png" alt="Screenshot 3">
            <img src="4.png" alt="Screenshot 4">
            <img src="5.png" alt="Screenshot 5">
            <img src="6.png" alt="Screenshot 6">
            <img src="7.png" alt="Screenshot 7">
        </div>
    </div>

    <div class="footer">
        <div class="footer-left">© 2026 SwiftSolve. All rights reserved.</div>
        <div class="footer-right">
            <a href="terms.html">Terms</a>
            <a href="privacy.html">Privacy</a>
            <a href="support.html">Support</a>
        </div>
    </div>
</body>
</html>
